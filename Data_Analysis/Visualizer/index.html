<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FM-PCC Dynamic Matrix Viewer</title>
    <!-- Include Chart.js for dynamic plotting -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #fff; color: #000; margin: 20px; line-height: 1.4; }
        h1 { border-bottom: 2px solid #000; padding-bottom: 5px; font-size: 22px; margin-bottom: 20px; }
        
        .section { margin-bottom: 30px; border: 1px solid #ccc; padding: 15px; }
        .section-title { font-weight: bold; margin-bottom: 10px; text-transform: uppercase; font-size: 14px; background: #eee; padding: 5px; border-left: 5px solid #000; }
        
        .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
        input[type="text"] { flex: 1; padding: 10px; font-size: 14px; border: 1px solid #000; }
        button { padding: 10px 20px; background: #000; color: #fff; border: none; cursor: pointer; font-size: 14px; font-weight: bold; }
        button:hover { background: #333; }
        
        .table-wrap { max-height: 200px; overflow-y: auto; border: 1px solid #eee; margin-top: 10px; }
        table { border-collapse: collapse; width: 100%; font-size: 11px; }
        th, td { border: 1px solid #ddd; padding: 6px; text-align: left; }
        th { background-color: #f9f9f9; position: sticky; top: 0; }

        .controls { display: flex; gap: 20px; margin-bottom: 20px; padding: 15px; background: #fdfdfd; border: 1px solid #eee; flex-wrap: wrap; }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 11px; font-weight: bold; color: #444; text-transform: uppercase; }
        select { padding: 8px; border: 1px solid #000; min-width: 180px; font-family: inherit; }

        .chart-container { position: relative; height: 500px; width: 100%; background: #fff; padding: 10px; border: 1px solid #eee; }
        
        .error { color: #d00; font-weight: bold; margin-top: 10px; border: 1px solid #d00; padding: 10px; background: #fff8f8; display: none; }
        .success { color: #080; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<h1>FM-PCC DYNAMIC_DATA_VIEWER (v3)</h1>

<!-- 1. DATA SOURCE -->
<div class="section">
    <div class="section-title">1. Data Source Selection</div>
    <div class="input-group">
        <input type="text" id="csvPath" placeholder="Enter path to aggregated_stats.csv..." value="../analysis_results/batch_v3_20260513_141822/20260513_131313_FM_V3_BATCH/aggregated_stats.csv">
        <button onclick="loadData()">Load & Sync</button>
    </div>
    <div id="errorMsg" class="error"></div>
    <div id="successMsg" class="success" style="display:none">CSV_SYNC_COMPLETE</div>
</div>

<!-- 2. PLOT ENGINE -->
<div class="section" id="plotSection" style="display:none">
    <div class="section-title">2. Dynamic Visual Analysis</div>
    
    <div class="controls">
        <div class="control-group">
            <label>Variant Group</label>
            <select id="variantGroup" onchange="renderChart()">
                <option value="MAJOR">Major Models (DPCC 3+3)</option>
                <option value="AUX">Auxiliary Baselines</option>
            </select>
        </div>
        <div class="control-group">
            <label>Environment</label>
            <select id="envSelect" onchange="renderChart()"></select>
        </div>
        <div class="control-group">
            <label>Primary Metric</label>
            <select id="metricSelect" onchange="renderChart()">
                <option value="n_success_and_constraints">Success Rate (Combined)</option>
                <option value="avg_time">Computation Time (ms)</option>
                <option value="avg_steps">Average Steps</option>
                <option value="avg_violation">Constraint Violation (Total)</option>
            </select>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="mainChart"></canvas>
    </div>
</div>

<!-- 3. DATA TABLE -->
<div class="section" id="dataSection" style="display:none">
    <div class="section-title">3. Raw Statistics Ledger</div>
    <div class="table-wrap" id="tableContainer"></div>
</div>

<script>
    let csvData = [];
    let myChart = null;

    const MAJOR_VARIANTS = ['dpcc-r', 'dpcc-c', 'dpcc-t', 'dpcc-r-tightened', 'dpcc-c-tightened', 'dpcc-t-tightened'];
    const AUX_VARIANTS = ['diffuser', 'gradient', 'gradient-tightened'];

    async function loadData() {
        const path = document.getElementById('csvPath').value;
        const err = document.getElementById('errorMsg');
        const succ = document.getElementById('successMsg');
        
        err.style.display = 'none';
        succ.style.display = 'none';

        try {
            const response = await fetch(path);
            if (!response.ok) throw new Error("File not found. Verify server is running at project root and path is correct.");
            
            const text = await response.text();
            parseCSV(text);
            renderTable(text);
            populateFilters();
            
            succ.style.display = 'block';
            document.getElementById('plotSection').style.display = 'block';
            document.getElementById('dataSection').style.display = 'block';
            
            renderChart();
        } catch (e) {
            err.innerText = "CRITICAL: " + e.message;
            err.style.display = 'block';
        }
    }

    function parseCSV(text) {
        const lines = text.split('\n').filter(l => l.trim());
        const headers = lines[0].split(',').map(h => h.trim());
        csvData = lines.slice(1).map(line => {
            const values = line.split(',');
            const obj = {};
            headers.forEach((h, i) => obj[h] = values[i].trim());
            return obj;
        });
    }

    function populateFilters() {
        const envs = [...new Set(csvData.map(d => d.halfspace_variant))].sort();
        const envSelect = document.getElementById('envSelect');
        envSelect.innerHTML = envs.map(e => `<option value="${e}">${e.toUpperCase()}</option>`).join('');
    }

    function renderChart() {
        const env = document.getElementById('envSelect').value;
        const group = document.getElementById('variantGroup').value;
        const metric = document.getElementById('metricSelect').value;
        const variants = (group === 'MAJOR') ? MAJOR_VARIANTS : AUX_VARIANTS;

        // Group data by Candidate and Variant
        const candidates = [...new Set(csvData.map(d => d.Candidate))].sort();
        const datasets = [];

        const colors = ['#000000', '#666666', '#999999', '#cccccc', '#333333', '#0000ff'];

        variants.forEach((v, idx) => {
            const data = candidates.map(c => {
                const row = csvData.find(d => d.halfspace_variant === env && d.Candidate === c && d.variant === v && d.metric === metric);
                return row ? parseFloat(row.value) : 0;
            });

            if (data.some(val => val > 0)) {
                datasets.push({
                    label: v.toUpperCase(),
                    data: data,
                    backgroundColor: colors[idx % colors.length],
                    borderColor: '#000',
                    borderWidth: 1
                });
            }
        });

        if (myChart) myChart.destroy();

        const ctx = document.getElementById('mainChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: candidates.map(c => `CANDIDATE_${c}`),
                datasets: datasets
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true, title: { display: true, text: metric.toUpperCase(), font: { weight: 'bold' } } },
                    x: { title: { display: true, text: 'CANDIDATE', font: { weight: 'bold' } } }
                },
                plugins: {
                    legend: { position: 'top', labels: { font: { family: 'Arial' } } },
                    title: { display: true, text: `DYNAMIC PERFORMANCE MATRIX: ${env.toUpperCase()} (${group})`, font: { size: 16 } }
                }
            }
        });
    }

    function renderTable(csvText) {
        const lines = csvText.split('\n').filter(l => l.trim());
        let html = '<table><thead><tr>';
        lines[0].split(',').forEach(h => html += `<th>${h}</th>`);
        html += '</tr></thead><tbody>';
        for (let i = 1; i < lines.length; i++) {
            html += '<tr>';
            lines[i].split(',').forEach(c => html += `<td>${c}</td>`);
            html += '</tr>';
        }
        html += '</tbody></table>';
        document.getElementById('tableContainer').innerHTML = html;
    }
</script>

</body>
</html>
