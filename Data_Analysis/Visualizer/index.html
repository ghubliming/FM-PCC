<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FM-PCC Naive Matrix Viewer</title>
    <style>
        body { font-family: Arial, sans-serif; background: #fff; color: #000; margin: 20px; line-height: 1.4; }
        h1 { border-bottom: 1px solid #000; padding-bottom: 5px; font-size: 20px; }
        
        .section { margin-bottom: 30px; border: 1px solid #ccc; padding: 15px; }
        .section-title { font-weight: bold; margin-bottom: 10px; text-transform: uppercase; font-size: 14px; background: #eee; padding: 5px; }
        
        input[type="text"] { width: 80%; padding: 8px; font-size: 14px; border: 1px solid #000; }
        button { padding: 8px 15px; background: #000; color: #fff; border: none; cursor: pointer; font-size: 14px; }
        
        table { border-collapse: collapse; width: 100%; font-size: 12px; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 6px; text-align: left; }
        th { background-color: #f2f2f2; }
        tr:nth-child(even) { background-color: #fafafa; }

        .controls { display: flex; gap: 20px; margin-top: 10px; flex-wrap: wrap; }
        .control-group { display: flex; flex-direction: column; gap: 4px; }
        select { padding: 5px; border: 1px solid #000; }

        .plot-container { margin-top: 20px; text-align: center; }
        img { max-width: 90%; border: 1px solid #ccc; background: #fff; }
        
        .error { color: red; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<h1>FM-PCC NAIVE_DATA_VIEWER</h1>

<!-- 1. DATA SOURCE -->
<div class="section">
    <div class="section-title">1. Load Data Source</div>
    <p>Paste the path to your <strong>aggregated_stats.csv</strong> file:</p>
    <input type="text" id="csvPath" placeholder="../analysis_results/batch_v3_.../aggregated_stats.csv" value="../analysis_results/batch_v3_20260513_131312/20260513_131313_FM_V3_BATCH/aggregated_stats.csv">
    <button onclick="loadCSV()">Load and View</button>
    <div id="errorMsg" class="error"></div>
</div>

<!-- 2. DATA TABLE -->
<div class="section" id="dataSection" style="display:none">
    <div class="section-title">2. Aggregated Statistics (Raw CSV)</div>
    <div id="tableContainer" style="max-height: 300px; overflow-y: auto;">
        <!-- CSV Table goes here -->
    </div>
</div>

<!-- 3. PLOT VIEW -->
<div class="section" id="plotSection" style="display:none">
    <div class="section-title">3. Visual Analysis (Hierarchical Plots)</div>
    
    <div class="controls">
        <div class="control-group">
            <label>View Mode</label>
            <select id="viewMode" onchange="updatePlot()">
                <option value="MAJOR">Major Variants (DPCC)</option>
                <option value="AUX">Auxiliary Variants</option>
            </select>
        </div>
        <div class="control-group">
            <label>Environment</label>
            <select id="envSelect" onchange="updatePlot()">
                <option value="both-hard">Both Hard</option>
                <option value="top-right-hard">Top Right Hard</option>
                <option value="top-left-hard">Top Left Hard</option>
            </select>
        </div>
        <div class="control-group">
            <label>Candidate</label>
            <select id="candSelect" onchange="updatePlot()">
                <option value="Candidate_A">Candidate A</option>
                <option value="Candidate_B">Candidate B</option>
            </select>
        </div>
        <div class="control-group">
            <label>Metric</label>
            <select id="metricSelect" onchange="updatePlot()">
                <option value="n_success_and_constraints">Success Rate</option>
                <option value="avg_time">Comp Time</option>
            </select>
        </div>
    </div>

    <div class="plot-container">
        <p><strong id="plotLabel">Loading Plot...</strong></p>
        <img id="mainPlot" src="" alt="Plot not found">
    </div>
</div>

<script>
    async function loadCSV() {
        const csvPath = document.getElementById('csvPath').value;
        const errorMsg = document.getElementById('errorMsg');
        errorMsg.innerText = "";
        
        try {
            const response = await fetch(csvPath);
            if (!response.ok) throw new Error("Could not load CSV file. Ensure the path is correct and the server is running from the root.");
            
            const text = await response.text();
            renderTable(text);
            document.getElementById('dataSection').style.display = 'block';
            document.getElementById('plotSection').style.display = 'block';
            updatePlot();
        } catch (e) {
            errorMsg.innerText = e.message;
            document.getElementById('dataSection').style.display = 'none';
            document.getElementById('plotSection').style.display = 'none';
        }
    }

    function renderTable(csvText) {
        const lines = csvText.split('\n');
        let html = '<table><thead><tr>';
        
        const headers = lines[0].split(',');
        headers.forEach(h => html += `<th>${h}</th>`);
        html += '</tr></thead><tbody>';
        
        for (let i = 1; i < lines.length; i++) {
            if (!lines[i].trim()) continue;
            html += '<tr>';
            const cells = lines[i].split(',');
            cells.forEach(c => html += `<td>${c}</td>`);
            html += '</tr>';
        }
        
        html += '</tbody></table>';
        document.getElementById('tableContainer').innerHTML = html;
    }

    function updatePlot() {
        const csvPath = document.getElementById('csvPath').value;
        // Derived path: folder/aggregated_stats.csv -> folder/hierarchical_analysis/
        const folderPath = csvPath.substring(0, csvPath.lastIndexOf('/'));
        const hierarchicalBase = `${folderPath}/hierarchical_analysis`;
        
        const mode = document.getElementById('viewMode').value;
        const env = document.getElementById('envSelect').value;
        const cand = document.getElementById('candSelect').value;
        const metric = document.getElementById('metricSelect').value;

        // Current UI defaults to showing the "By Environment" plot as the main one
        const src = `${hierarchicalBase}/by_test_env/${env}/${mode}_comp_${metric}.png`;
        
        document.getElementById('mainPlot').src = src;
        document.getElementById('plotLabel').innerText = `PLOT: ${env} | ${mode} | ${metric}`;
    }

    // Initial check
    if (document.getElementById('csvPath').value) {
        // We don't auto-load because it might trigger error immediately
    }
</script>

</body>
</html>
