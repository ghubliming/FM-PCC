# General
write_to_file: True
exps: [
  'aligning-d3il-visual',
  'visual_aligning_dpcc',
  'fm_visual_aligning',
]
seeds: [6, 7, 8, 9, 10]

# --- STATE-ONLY PARAMETERS (COMMENTED OUT: NOT NEEDED FOR VISUAL ALIGNING) ---
# avoiding_halfspace_variants: [
#   'top-right-hard',
#   'top-left-hard',
#   'both-hard',
# ] # NOT NEEDED: Aligning task represents open-table manipulation and has no vertical halfspace walls.
#
# n_trials: 2 # NOT NEEDED: Visual aligning uses 'n_contexts: 30' context rollouts for robust statistical evaluation.
#
# dt: {
#   'avoiding': 1,
# } # NOT IN USE: setup_dpcc_projector() defaults to dt=1.0 (config.get('dt', 1.0)).
#   # dt=1.0 IS CORRECT for this task: actions are position deltas [dx,dy,dz], not
#   # velocity × dt. The Euler dynamics constraint is c_pos[t+1] = c_pos[t] + 1.0 * act[t].
#   # DO NOT set dt=0.1 (the robot controller integration step) — that value belongs to
#   # the physical controller, not to the DPCC trajectory constraint scaling.
#
# observation_indices: {
#   'avoiding': {'x_des': 0, 'y_des': 1, 'x': 2, 'y': 3},
# } # NOT IN USE: Our eval script hardcodes trajectory indices directly in setup_dpcc_projector()
#   # as ('deriv', [6,0]), ('deriv', [7,1]), ('deriv', [8,2]). No YAML lookup needed.
#
# action_indices: {
#   'avoiding': {'vx': 0, 'vy': 1},
# } # NOT IN USE: Same reason — action dims 0-2 are hardcoded in setup_dpcc_projector().
#   # workspace_bounds (below) replaces the old 'bounds' dict for Cartesian safety limits.
# -----------------------------------------------------------------------------

# D3IL simulation parameters
n_contexts: 30
n_trajectories_per_context: 1

# Policy
diffusion_timestep_threshold: 0.5

# Projection 
projection_variants: [
  # Table 1:
  'diffuser',
  'gradient',
  'gradient-tightened',
  'post_processing',
  'post_processing-tightened',
  'model_free',
  'model_free-tightened',
]

# --- STATE-ONLY PROJECTION BASES (COMMENTED OUT: NOT NEEDED FOR VISUAL ALIGNING) ---
# projection_cost: 'pos_vel' # NOT NEEDED: Visual aligning cost is optimized directly on the 6D states and actions.
#
# halfspace_constraints: {
#   'avoiding-d3il': [
#     [[0.8, -0.5], [0.4, 0.5], 'below'],
#     [[0.2, -0.5], [0.6, 0.5], 'below'],
#   ],
# } # NOT NEEDED: Aligning workspace has no simulated halfspace obstacles.
#
# obstacle_constraints: {
#   'avoiding-d3il': [
#     {'type': 'sphere_outside', 'dimensions': ['x', 'y'], 'center': [0.4, 0.08], 'radius': 0.06},
#   ]
# } # NOT NEEDED: Aligning workspace has no simulated spherical obstacles.
#
# bounds: {
#   'avoiding-d3il': [
#     {'type': 'lower', 'dimensions': ['vx', 'vy'], 'values': [-0.01, 0]},
#   ],
# } # NOT NEEDED: Replaced by 'workspace_bounds' below, which enforces safe physical Cartesian ranges.
#
# plot_how_many: 10
# ax_limits: {
#   'avoiding-d3il': [[0.2, 0.8], [-0.3, 0.4]]
# } # NOT NEEDED: Handled visually via 3D MuJoCo rendering and Tee log interceptors instead of 2D matplotlib axes.
# ---------------------------------------------------------------------------------

# Physical Franka Workspace bounds in meters (x, y, z)
workspace_bounds:
  lb: [0.3, -0.35, 0.05]
  ub: [0.7, 0.35, 0.40]

# DPCC Projection parameters
enlarge_constraints: 0.01          # Tightening/Contracting amount in meters for bounds
# constraint_types: ['bounds', 'dynamics']  # Ready to enable — A4+B1+C4 fixes applied (Fix 8)
constraint_types: []               # OPTION A: No constraints (kept disabled per user decision — Fix 8)

# Safety clamp — max physical delta per step (metres). null = disabled.
# 0.01 m ≈ 45× the healthy Gen6V4 step size; stops ODE explosions while
# allowing normal fast-approach actions. Adjust per experiment.
max_action_delta: 0.01
