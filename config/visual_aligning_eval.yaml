# Visual Aligning Evaluation Config
# Mirrors config/projection_eval.yaml structure for the Aligning (Visual) task.
#
# Key difference from Avoiding:
#   - No halfspace/obstacle constraints (aligning is unconstrained manipulation)
#   - Uses D3IL's Aligning_Sim with vision=True
#   - Metrics: Success Rate, Entropy, Mean Distance (D3IL standard)

write_to_file: True

# Seeds to evaluate (same as avoiding for consistency)
seeds: [6, 7, 8, 9, 10]

# D3IL simulation parameters
n_contexts: 30
n_trajectories_per_context: 1

projection_variants: [
  'diffuser',
  'fmpcc_safe',
  'fmpcc_safe_tightened',
]

# Physical Franka Workspace bounds in meters (x, y, z)
workspace_bounds:
  lb: [0.3, -0.35, 0.05]
  ub: [0.7, 0.35, 0.40]

# DPCC Projection parameters
diffusion_timestep_threshold: 0.5
enlarge_constraints: 0.01          # Tightening/Contracting amount in meters for bounds
constraint_types: ['bounds', 'dynamics']

