# Configuration for iMeanFlow on D3IL Robot Arm Tasks
# Extends base configuration with D3IL-specific hyperparameters

extends: "fm_imeanflow_base.yaml"

# Task
task: "d3il_robot_arm"
environment: "d3il"

# Architecture adjustments for robot state
architecture:
  state_dim: 28  # D3IL state space (typically 7 DOF + 21 auxiliary)
  dual_velocity:
    u_net_hidden_dim: 256
    v_net_hidden_dim: 256
    use_jvp_guidance: True  # Enable JVP for safety-critical robot control
    jvp_hidden_dim: 128
  
  time_conditioning:
    enabled: True
    time_dim: 128

# Training for robot tasks (longer, more careful)
training:
  max_epochs: 150
  batch_size: 32
  learning_rate: 5.0e-4  # Slightly lower for stability
  weight_decay: 1.0e-5
  warmup_steps: 2000
  
  loss_schedule:
    mode: "u_first"
    weight_u_start: 0.9  # Stronger emphasis on global motion
    weight_v_start: 0.0
    weight_u_end: 0.4
    weight_v_end: 0.4
    weight_jvp: 0.2  # Enable constraint guidance (safety)
  
  checkpoint_interval: 5
  validation_split: 0.15

# ODE Solver (more precise for robot control)
ode_solver:
  solver_type: "dopri5"
  num_steps: 15
  max_step_size: 0.05
  atol: 1.0e-7
  rtol: 1.0e-4

# Sampling
sampling:
  nfe: 2  # Always use dual-step for quality
  nfe_split: 0.5
  
  goal_guidance:
    enabled: True  # Guide toward target poses
    weight: 0.15
  
  obstacle_avoidance:
    enabled: True  # Avoid self-collision
    weight: 0.10

# JVP Constraint Configuration
jvp_constraints:
  collision_free:
    enabled: True
    weight: 0.2
    obstacle_margin: 0.05  # Minimum distance from obstacles
  
  smoothness:
    enabled: True
    weight: 0.15
    max_acceleration: 2.0  # rad/s² for joint trajectories
  
  joint_limits:
    enabled: True
    weight: 0.1
    margin: 0.05  # Percentage of joint range

# Metrics
metrics:
  track_u_error: True
  track_v_error: True
  track_smoothness: True
  track_decomposition: True
  window_size: 100
  
  # D3IL-specific metrics
  track_collision: True
  track_joint_limits: True
  track_task_success: True

# Data
data:
  trajectory_length: 25  # Longer trajectories for manipulation
  state_dim: 28
  normalize: True
  
  # D3IL-specific
  demo_source: "d3il_dataset"
  augmentation: True
  augmentation_strength: 0.1

# Logging
logging:
  level: "INFO"
  log_interval: 50
  log_metrics: True
  log_trajectories: True
  save_trajectories: True
  tensorboard: True
  wandb: False

# Seed
seed: 42
