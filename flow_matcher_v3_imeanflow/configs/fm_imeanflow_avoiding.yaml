# Configuration for iMeanFlow on Obstacle Avoidance Tasks
# Extends base configuration for navigation with static/dynamic obstacles

extends: "fm_imeanflow_base.yaml"

# Task
task: "obstacle_avoidance"
environment: "navigation"

# Architecture for obstacle avoidance
architecture:
  state_dim: 28  # Position/velocity + auxiliary features
  dual_velocity:
    u_net_hidden_dim: 256
    v_net_hidden_dim: 256
    use_jvp_guidance: True  # Enable for safety
    jvp_hidden_dim: 128
  
  # Optional obstacle encoder
  obstacle_encoder:
    enabled: True
    obstacle_dim: 64
    hidden_dim: 128
    encoder_type: "mlp"

# Training for obstacle avoidance (aggressive safety)
training:
  max_epochs: 120
  batch_size: 32
  learning_rate: 1.0e-3
  weight_decay: 1.0e-5
  warmup_steps: 1500
  
  # Heavy emphasis on safe trajectory generation
  loss_schedule:
    mode: "curriculum"  # Gradually increase v weight for refinement
    weight_u_start: 0.7  # Global direction
    weight_v_start: 0.1  # Start with small local refinement
    weight_u_end: 0.4
    weight_v_end: 0.4
    weight_jvp: 0.2  # Constraint guidance (safety)
  
  checkpoint_interval: 5
  validation_split: 0.2

# ODE Solver (balanced for safety and speed)
ode_solver:
  solver_type: "dopri5"
  num_steps: 12
  max_step_size: 0.08
  atol: 1.0e-6
  rtol: 1.0e-3

# Sampling - prioritize safety
sampling:
  nfe: 2  # Dual-step for safety
  nfe_split: 0.4  # Spend more time on u (global safety)
  
  goal_guidance:
    enabled: True
    weight: 0.12
  
  obstacle_avoidance:
    enabled: True  # Critical for this task
    weight: 0.20  # Strong repulsion
    dynamic_obstacles: True  # Support moving obstacles

# JVP Constraint Configuration (aggressive)
jvp_constraints:
  collision_free:
    enabled: True
    weight: 0.4  # Heavy emphasis
    obstacle_margin: 0.10  # Large safety margin
    collision_penalty: 10.0  # Harsh penalty for violations
  
  smoothness:
    enabled: True
    weight: 0.15
    max_acceleration: 1.5  # Conservative acceleration limit
  
  goal_reaching:
    enabled: True
    weight: 0.1
    goal_tolerance: 0.05

# Metrics - safety-focused
metrics:
  track_u_error: True
  track_v_error: True
  track_smoothness: True
  track_decomposition: True
  window_size: 100
  
  # Obstacle avoidance specific
  track_collision: True
  min_distance_to_obstacle: True
  collision_rate: True
  success_rate: True

# Data
data:
  trajectory_length: 30  # Longer for complex navigation
  state_dim: 28
  normalize: True
  
  # Obstacle avoidance specific
  include_obstacles: True
  obstacle_config:
    num_obstacles: 5  # Default, adjustable per scenario
    obstacle_types: ["sphere", "cylinder", "box"]
    static_obstacles: True
    dynamic_obstacles: False  # Can enable for harder scenarios

# Sampling during evaluation
evaluation:
  num_rollouts: 100
  use_obstacle_avoidance: True
  track_collision_violations: True
  success_metrics: ["reaches_goal", "no_collision", "smooth_path"]

# Logging
logging:
  level: "INFO"
  log_interval: 50
  log_metrics: True
  log_trajectories: True
  save_failures: True  # Save collision cases for analysis
  tensorboard: True
  wandb: False

# Seed
seed: 42
